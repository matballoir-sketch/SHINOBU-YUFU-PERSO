<main class="hub"><div class="wisteria"><i></i><i></i><i></i><i></i></div><section class="intro-copy"><div class="kicker">Résidence de Shinobu Kocho</div><h1>Entrez dans<br>le Domaine</h1><p>Chaque aile mène à une facette de Shinobu : son histoire, son esprit, sa science, ses liens et la lame empoisonnée qui porte sa volonté.</p><div class="hint">Sélectionnez un papillon du cercle</div></section>

<template id="history"><div class="sheet-head"><div><div class="section-num">Archive I — Mémoire</div><h2>Son histoire</h2><p class="lead">Une vie façonnée par la perte, l’héritage de Kanae et une préparation silencieuse dirigée vers un unique adversaire.</p></div><div class="visual"><img src="assets/shinobu.jpg" alt="Souvenir de Shinobu" onerror="this.remove()"></div></div><div class="timeline"><article><b>Les sœurs Kocho</b><p>Après la mort de leurs parents, Shinobu et Kanae sont sauvées par Gyomei Himejima, puis choisissent de rejoindre le Corps des Pourfendeurs.</p></article><article><b>L’héritage de Kanae</b><p>La disparition de sa sœur transforme profondément Shinobu. Elle adopte son sourire et tente de porter son souhait de coexistence, malgré une colère qu’elle ne parvient pas à éteindre.</p></article><article><b>Le Domaine</b><p>Shinobu devient Pilier de l’Insecte, dirige le Domaine des Papillons et met ses connaissances médicales au service des pourfendeurs blessés.</p></article><article><b>La préparation</b><p>Consciente de ses limites physiques, elle construit patiemment une stratégie fondée sur la glycine et sur sa propre capacité à devenir l’ultime poison.</p></article></div></template>
<template id="mind"><div class="sheet-head"><div><div class="section-num">Archive II — Esprit</div><h2>Le calme trompeur</h2><p class="lead">Sa politesse, son sourire et sa voix légère forment une surface élégante. Sous celle-ci persistent la lucidité, la douleur et une détermination presque cruelle.</p></div><div class="visual"></div></div><div class="grid"><article class="card"><h3>Douceur apparente</h3><p>Elle s’exprime avec calme et conserve une présence rassurante, même lorsqu’elle menace un démon avec une précision glaçante.</p></article><article class="card"><h3>Colère intérieure</h3><p>Sa haine des démons est profondément liée à la perte de Kanae. Son sourire devient une discipline et une armure.</p></article><article class="card"><h3>Intelligence</h3><p>Observation, médecine et préparation remplacent la force brute. Shinobu transforme chaque faiblesse en méthode.</p></article><article class="card"><h3>Compassion</h3><p>Elle soigne, enseigne et protège les membres du Corps, particulièrement ceux qui passent par le Domaine.</p></article><article class="card"><h3>Provocation</h3><p>Son humour délicat peut devenir déstabilisant. Elle utilise les mots comme elle utilise son dard : avec précision.</p></article><article class="card"><h3>Volonté</h3><p>Une fois sa décision prise, elle accepte même un sacrifice total afin que son plan puisse atteindre son objectif.</p></article></div></template>
<template id="combat"><div class="sheet-head"><div><div class="section-num">Archive III — Lame</div><h2>Combattre autrement</h2><p class="lead">Shinobu ne possède pas la force nécessaire pour décapiter un démon. Elle a donc créé un style reposant sur la vitesse, l’estoc, la précision et le poison.</p></div><div class="visual"></div></div><div class="grid"><article class="card"><h3>Vitesse</h3><p>Ses accélérations soudaines donnent l’impression d’un papillon qui disparaît avant l’impact.</p></article><article class="card"><h3>Estoc</h3><p>Sa Nichirin est conçue pour perforer plutôt que trancher, injectant le poison directement dans le corps du démon.</p></article><article class="card"><h3>Dosage adaptatif</h3><p>Elle modifie ses préparations et évalue rapidement leur effet afin d’ajuster son approche.</p></article><article class="card"><h3>Précision</h3><p>Chaque mouvement vise un point précis et limite les gestes inutiles.</p></article><article class="card"><h3>Analyse</h3><p>Elle observe la régénération et les réactions de son adversaire pendant le combat.</p></article><article class="card"><h3>Stratégie finale</h3><p>Sa plus grande arme n’est pas seulement sa lame, mais la préparation réalisée bien avant le début de l’affrontement.</p></article></div></template>
<template id="breath"><div class="sheet-head"><div><div class="section-num">Archive IV — Manuscrit</div><h2>Souffle de l’Insecte</h2><p class="lead">Une dérivation du Souffle de la Fleur, conçue pour imiter la légèreté, la trajectoire et les attaques perforantes des insectes.</p></div><div class="visual"></div></div><div class="techniques"><article class="technique"><b>Danse du Papillon — Caprice</b><p>Une série d’approches légères et d’estocs rapides destinés à injecter le poison.</p></article><article class="technique"><b>Danse de l’Abeille — Véritable Voltige</b><p>Une charge rectiligne d’une grande vitesse visant un point vital.</p></article><article class="technique"><b>Danse de la Libellule — Hexagone Oculaire</b><p>Six attaques successives visant différentes zones du corps adverse.</p></article><article class="technique"><b>Danse du Mille-pattes — Zigzag aux Cent Pattes</b><p>Une accélération en trajectoire sinueuse qui déroute l’ennemi avant l’estoc final.</p></article></div></template>
<template id="relations"><div class="sheet-head"><div><div class="section-num">Archive V — Liens</div><h2>Les fils du papillon</h2><p class="lead">Survolez les noms. Chaque lien éclaire une partie différente du cœur de Shinobu.</p></div><div class="visual"></div></div><div class="relation-map"><div class="rel-center rel-img" style="--portrait:url('assets/shinobu.jpg')"><span>Shinobu<br>Kocho</span></div><button class="rel interactive rel-img" style="--portrait:url('assets/kanae-kocho.jpg')"><span>Kanae<br>Kocho</span></button><button class="rel interactive rel-img" style="--portrait:url('assets/kanao-tsuyuri.jpg')"><span>Kanao<br>Tsuyuri</span></button><button class="rel interactive">Aoi<br>Kanzaki</button><button class="rel interactive">Giyu<br>Tomioka</button><button class="rel interactive" id="domaRel">Doma</button></div></template>
<template id="domain"><div class="sheet-head"><div><div class="section-num">Archive VI — Résidence</div><h2>Le Domaine des Papillons</h2><p class="lead">Un lieu de repos, de soin et de reconstruction. Derrière ses couloirs paisibles se trouvent aussi les recherches et les souvenirs de Shinobu.</p></div><div class="visual"><img src="assets/domaine-des-papillons.jpg" alt="Domaine des Papillons"></div></div><div class="grid"><article class="card"><h3>Salle de soins</h3><p>Les pourfendeurs y reçoivent les traitements nécessaires après leurs missions.</p></article><article class="card"><h3>Rééducation</h3><p>Entraînements respiratoires, récupération physique et exercices supervisés rythment la convalescence.</p></article><article class="card"><h3>Jardin de glycines</h3><p>La glycine protège, soigne symboliquement et rappelle la frontière fragile entre beauté et poison.</p></article><article class="card"><h3>Laboratoire</h3><p>Une zone plus secrète consacrée aux observations et aux préparations de Shinobu.</p></article><article class="card"><h3>Archives</h3><p>Dossiers médicaux, rapports et souvenirs y sont conservés loin des regards.</p></article><article class="card"><h3>Famille choisie</h3><p>Le Domaine devient un foyer pour Kanao, Aoi et les jeunes assistantes qui y vivent.</p></article></div></template>
<template id="lab"><div class="sheet-head"><div><div class="section-num">Archive VII — Science</div><h2>Laboratoire de glycine</h2><p class="lead">Une interface fictive inspirée de l’univers de Demon Slayer. Les informations restent narratives et ne constituent aucune instruction réelle.</p></div><div class="visual"></div></div><div class="lab"><div class="lab-table"><div class="vials"><button class="tube interactive" style="--fill:40%"></button><button class="tube interactive" style="--fill:62%"></button><button class="tube interactive" style="--fill:78%"></button><button class="tube interactive" style="--fill:52%"></button></div></div><div class="dossier"><h3>Dossier médical — Glycine</h3><p><b>Usage narratif :</b> base des poisons utilisés par Shinobu contre les démons.</p><p><b>Méthode :</b> adaptation fictive du dosage selon la résistance observée.</p><p><b>Limite :</b> les démons puissants peuvent décomposer ou neutraliser progressivement un poison insuffisant.</p><p><b>Note :</b> aucune formule réelle n’est présentée.</p></div></div></template>
<template id="legacy"><div class="sheet-head"><div><div class="section-num">Archive VIII — Transmission</div><h2>Son héritage</h2><p class="lead">Shinobu laisse derrière elle bien davantage qu’une technique : une volonté transmise, un domaine vivant et une victoire rendue possible par la confiance.</p></div><div class="visual"></div></div><div class="grid"><article class="card"><h3>Kanao</h3><p>Elle transmet à Kanao un foyer, une formation et la possibilité de choisir avec son propre cœur.</p></article><article class="card"><h3>Le Domaine</h3><p>Son travail médical continue d’influencer la manière dont le Corps protège ses membres.</p></article><article class="card"><h3>La victoire</h3><p>Son plan repose sur une confiance absolue envers ceux qui poursuivront le combat après elle.</p></article></div><div class="secret" id="kanaeSecret">Un papillon blanc semble caché entre les archives…</div></template>
</body>
<script>
const panel=document.getElementById('panel'),content=document.getElementById('content'),transition=document.getElementById('transition'),cursor=document.getElementById('cursor');let secretClicks=0;
function bindInteractive(){document.querySelectorAll('.interactive,button,a').forEach(el=>{el.onmouseenter=()=>cursor.classList.add('hover');el.onmouseleave=()=>cursor.classList.remove('hover')})}
function openPanel(id){transition.classList.add('active');setTimeout(()=>{const tpl=document.getElementById(id);content.innerHTML='';content.appendChild(tpl.content.cloneNode(true));panel.classList.add('open');document.body.dataset.section=id;bindInteractive();wireSecrets(id)},520);setTimeout(()=>transition.classList.remove('active'),1150)}
function closePanel(){panel.classList.remove('open');document.body.dataset.section='';}
document.querySelectorAll('.node').forEach(n=>n.onclick=()=>openPanel(n.dataset.panel));document.getElementById('close').onclick=closePanel;panel.onclick=e=>{if(e.target===panel)closePanel()};addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
function wireSecrets(id){if(id==='relations'){const d=document.getElementById('domaRel');if(d)d.onclick=()=>{d.textContent='…';document.querySelector('.sheet').style.boxShadow='0 35px 100px #000,0 0 70px #65dfff33';setTimeout(()=>d.textContent='Doma',900)}}if(id==='legacy'){const s=document.getElementById('kanaeSecret');s.onclick=()=>{secretClicks++;if(secretClicks>=3){s.classList.add('unlocked');s.innerHTML='<b>Dossier K — Kanae Kocho</b><br>« Continue de sourire, Shinobu. Même lorsque le chemin devient douloureux. »'}}}}
document.getElementById('secretBtn').onclick=()=>openPanel('legacy');

const musicFrame=document.getElementById('ytMusic'),musicBtn=document.getElementById('musicBtn');let musicOn=localStorage.getItem('shinobuMusic')!=='off';
const yt=(func,args=[])=>musicFrame.contentWindow?.postMessage(JSON.stringify({event:'command',func,args}),'*');
function applyMusic(userGesture=false){if(musicOn){yt('playVideo');if(userGesture)yt('unMute');yt('setVolume',[38]);musicBtn.classList.add('playing');musicBtn.textContent='♫'}else{yt('pauseVideo');musicBtn.classList.remove('playing');musicBtn.textContent='♪'}localStorage.setItem('shinobuMusic',musicOn?'on':'off')}
musicFrame.addEventListener('load',()=>setTimeout(()=>applyMusic(false),450));const unlockMusic=()=>{if(musicOn)applyMusic(true);removeEventListener('pointerdown',unlockMusic,true);removeEventListener('keydown',unlockMusic,true)};addEventListener('pointerdown',unlockMusic,true);addEventListener('keydown',unlockMusic,true);musicBtn.onclick=e=>{e.stopPropagation();musicOn=!musicOn;applyMusic(true)};

addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';document.documentElement.style.setProperty('--mx',e.clientX+'px');document.documentElement.style.setProperty('--my',e.clientY+'px');if(Math.hypot(e.movementX,e.movementY)>12&&Math.random()>.55)particle(e.clientX,e.clientY)});
function particle(x,y){const p=document.createElement('i');p.className='particle';p.style.left=x+'px';p.style.top=y+'px';p.style.setProperty('--dx',(Math.random()*50-25)+'px');p.style.setProperty('--dy',(Math.random()*40-30)+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),850)}
addEventListener('click',e=>{const f=document.createElement('i');f.className='clickfx';f.style.left=e.clientX+'px';f.style.top=e.clientY+'px';document.body.appendChild(f);for(let i=0;i<6;i++)particle(e.clientX,e.clientY);setTimeout(()=>f.remove(),750)});bindInteractive();
</script>
</html>
